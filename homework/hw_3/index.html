<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List</title>
</head>
<style>
    .fruits-list {
        background-color: #e6a3af;
        margin: 20px;
        padding: 20px;
    }

    .fruits-list li {
        background-color: #c76b7b;
        margin: 10px 0;
        padding: 10px;
    }

    .dark-item {
        background-color: #a94f63;
    }
</style>

<body>

    <h2>Fruits List</h2>

    <ol class="fruits-list">
        <li>Apple</li>
        <li class="dark-item">Orange</li>
        <li>Pineapple</li>
        <li>Pear</li>
        <li>Cherry</li>
    </ol>
</body>

</html>
